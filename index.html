<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAYMENT byanXpay</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="icon" href="https://files.catbox.moe/lmgllx.jpg" type="image/png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: black;
      font-family: 'Poppins', sans-serif;
      color: #aaa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* GAMBAR BACKGROUND */
    #bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://files.catbox.moe/tnz2bp.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      opacity: 0.6;
      pointer-events: none;
    }

    .page {
      display: block;
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px 30px;
      border-radius: 20px;
      z-index: 2;
      position: relative;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(3px);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
      animation: fadeIn .8s ease;
    }

    .page::-webkit-scrollbar {
      width: 5px;
    }
    .page::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .page::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 100px;
      filter: drop-shadow(0 0 30px #fff);
      margin-bottom: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .title {
      font-size: 32px;
      color: #fff;
      text-shadow: 0 0 10px #000;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 14px;
      color: #fff;
      margin-bottom: 30px;
      text-shadow: 0 0 5px #000;
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: linear-gradient(135deg, rgba(170,170,170,0.9), rgba(119,119,119,0.9));
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: .3s;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .pay-btn:hover {
      background: rgba(136,136,136,0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 255, 255, 0.3);
    }

    /* Tombol Musik */
    .music-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: linear-gradient(135deg, rgba(147, 51, 234, 0.9), rgba(126, 34, 206, 0.9));
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: .3s;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .music-btn:hover {
      background: rgba(126, 34, 206, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(147, 51, 234, 0.3);
    }

    .music-btn.playing {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.9));
    }

    .equalizer {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 20px;
      margin-left: 8px;
    }

    .equalizer span {
      width: 4px;
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: equalize 1s infinite ease-in-out;
    }

    .equalizer span:nth-child(1) { animation-delay: 0s; }
    .equalizer span:nth-child(2) { animation-delay: 0.2s; }
    .equalizer span:nth-child(3) { animation-delay: 0.4s; }
    .equalizer span:nth-child(4) { animation-delay: 0.6s; }

    @keyframes equalize {
      0%, 100% { height: 5px; }
      50% { height: 20px; }
    }

    .volume-control {
      width: 100%;
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }

    .volume-control input[type="range"] {
      flex: 1;
      height: 5px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      outline: none;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    /* QRIS Styles */
    .qris-img {
      width: 260px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
    }

    .qris-container {
      text-align: center;
      margin: 20px 0;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      backdrop-filter: blur(5px);
    }

    /* Teks Peringatan */
    .warning-text {
      text-align: center;
      color: #ffaa00;
      font-size: 12px;
      font-weight: bold;
      margin: 20px 0 10px;
      padding: 10px;
      background: rgba(255, 170, 0, 0.1);
      border-radius: 8px;
      border: 1px solid #ffaa00;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #fff;
      text-shadow: 0 0 5px #000;
    }

    .notification {
      position: fixed;
      top: 20px; right: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #fff;
      color: white;
      z-index: 1000;
      transform: translateX(100vw);
      transition: .3s;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
    }

    .notification.show {
      transform: translateX(0);
    }
  </style>
</head>
<body>
  <!-- BACKGROUND IMAGE -->
  <div id="bg-image"></div>

  <!-- Audio Player -->
  <audio id="bgMusic" loop preload="auto">
    <source src="https://files.catbox.moe/58we7q.mp4" type="audio/mpeg">
    <source src="https://files.catbox.moe/v363ok.mp4" type="audio/mp4">
    Browser tidak mendukung audio player.
  </audio>

  <div id="paymentPage" class="page">
    <div class="logo-container">
      <img src="https://files.catbox.moe/lmgllx.jpg" alt="Logo" class="logo">
      <div class="title">PAYMENT byanXpay</div>
      <div class="subtitle">Klik Button untuk salin nomor</div>
    </div>

    <!-- Tombol Musik -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
      <i class="fas fa-music" id="musicIcon"></i> 
      <span id="musicText">Putar Musik</span>
      <div class="equalizer" id="equalizer" style="display: none;">
        <span></span><span></span><span></span><span></span>
      </div>
    </button>

    <div id="volumeControl" class="volume-control hidden">
      <i class="fas fa-volume-down" style="color: white;"></i>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">
      <i class="fas fa-volume-up" style="color: white;"></i>
    </div>

    <!-- DANA -->
    <button class="pay-btn" onclick="copyText('6289682962585')">
      <i class="fas fa-wallet"></i>NO DANA 6289682962585
    </button>

    <!-- TOMBOL QRIS (BARU) -->
    <button class="pay-btn" onclick="toggleQRIS()">
      <i class="fas fa-qrcode"></i> Tampilkan QRIS
    </button>

    <!-- QRIS CONTAINER -->
    <div id="qrisContainer" class="qris-container hidden">
      <h3 style="color:#fff; margin-bottom:15px;">QRIS Pembayaran</h3>
      <img src="https://files.catbox.moe/8ahcy9.jpg" alt="QRIS" class="qris-img">
      <p style="color:#ccc; margin:10px 0;">Scan QRIS di atas untuk bayar</p>
      <button class="pay-btn" onclick="downloadQRIS()">
        <i class="fas fa-download"></i> Download QRIS
      </button>
    </div>

    <!-- Teks Peringatan -->
    <div class="warning-text">
      ⚠️ WAJIB SS BUKTI TF ⚠️<br>
      TRX DI ANGGAP DONE + NO REFF ✅
    </div>

    <div class="footer">© 2026 PAYMENT byanXpay</div>
  </div>

  <div id="notification" class="notification">
    <i class="fas fa-check-circle"></i>
    <span id="notification-text">Disalin!</span>
  </div>

  <script>
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');
    const musicText = document.getElementById('musicText');
    const equalizer = document.getElementById('equalizer');
    const volumeControl = document.getElementById('volumeControl');
    const volumeSlider = document.getElementById('volumeSlider');

    let isPlaying = false;
    audio.volume = 0.5;

    function toggleMusic() {
      if (isPlaying) {
        audio.pause();
        musicBtn.classList.remove('playing');
        musicIcon.className = 'fas fa-music';
        musicText.textContent = 'Putar Musik';
        equalizer.style.display = 'none';
        volumeControl.classList.add('hidden');
        showNotif('Musik dijeda', 1500);
      } else {
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              musicBtn.classList.add('playing');
              musicIcon.className = 'fas fa-pause';
              musicText.textContent = 'Jeda Musik';
              equalizer.style.display = 'inline-flex';
              volumeControl.classList.remove('hidden');
              showNotif('Musik dimainkan', 1500);
            })
            .catch(error => {
              console.log('Gagal memutar musik:', error);
              showNotif('Gagal memutar musik. Cek link atau format file.', 2000);
            });
        }
      }
      isPlaying = !isPlaying;
    }

    function setVolume(value) {
      audio.volume = value;
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        const notif = document.getElementById("notification");
        document.getElementById("notification-text").textContent = text + " berhasil disalin!";
        notif.classList.add("show");
        setTimeout(() => notif.classList.remove("show"), 2500);
      }).catch(() => {
        alert("Gagal menyalin. Coba manual: " + text);
      });
    }

    function toggleQRIS() {
      const qris = document.getElementById('qrisContainer');
      qris.classList.toggle('hidden');
      
      const btn = event.currentTarget;
      if (qris.classList.contains('hidden')) {
        btn.innerHTML = '<i class="fas fa-qrcode"></i> Tampilkan QRIS';
      } else {
        btn.innerHTML = '<i class="fas fa-qrcode"></i> Sembunyikan QRIS';
      }
    }

    function downloadQRIS() {
      const link = document.createElement('a');
      link.href = 'https://files.catbox.moe/8ahcy9.jpg';
      link.download = 'qris_byanXpay.jpg';
      link.click();
      
      showNotif('QRIS didownload!', 2000);
    }

    function showNotif(msg, duration) {
      const notif = document.getElementById('notification');
      document.getElementById('notification-text').textContent = msg;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), duration);
    }

    audio.addEventListener('error', function() {
      console.log('Audio error:', audio.error);
      showNotif('File audio tidak bisa diputar', 2000);
    });
  </script>
</body>
</html>
